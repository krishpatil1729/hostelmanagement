{% extends "base.html" %}

{% block title %}Visitors{% endblock %}

{% block nav_links %}
<a href="/warden/dashboard">Dashboard</a>
<a href="/warden/students">Students</a>
<a href="/warden/complaints">Complaints</a>
<a href="/warden/inventory">Inventory</a>
<a href="/warden/maintenance">Maintenance</a>
<a href="/warden/visitors">Visitors</a>
{% endblock %}

{% block content %}
<div class="page-title">Visitor Logs</div>

<div class="section">
    <div class="section-title">Filter</div>
    <div class="form-grid">
        <div class="form-group">
            <label>Status</label>
            <select id="filter_status" onchange="applyFilter()">
                <option value="">All</option>
                <option value="ACTIVE">Active (Inside)</option>
                <option value="COMPLETED">Completed (Checked Out)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Search Visitor / Student</label>
            <input type="text" id="filter_search" placeholder="Name, phone or room..." oninput="applyFilter()">
        </div>
    </div>
</div>

<div class="section">
    <div class="section-title">Visitor Logs <span id="visitor-count" style="font-weight:normal;color:#888;font-size:14px;"></span></div>
    <div class="table-wrap">
        <table id="visitors-table"></table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let allVisitors = [];

    async function loadVisitors() {
        const res = await apiRequest("GET", "/api/warden/visitors");
        if (!res || !res.ok) return;
        allVisitors = res.data.visitors;
        applyFilter();
    }

    function applyFilter() {
        const status = document.getElementById("filter_status").value;
        const search = document.getElementById("filter_search").value.toLowerCase();
        let filtered = allVisitors;
        if (status) filtered = filtered.filter(v => v.status === status);
        if (search) {
            filtered = filtered.filter(v =>
                (v.visitor_name || "").toLowerCase().includes(search) ||
                (v.student_name || "").toLowerCase().includes(search) ||
                (v.phone || "").includes(search) ||
                (v.room_number || "").toLowerCase().includes(search)
            );
        }
        document.getElementById("visitor-count").textContent = `(${filtered.length} records)`;
        buildTable("visitors-table", filtered);
    }

    document.addEventListener("DOMContentLoaded", loadVisitors);
</script>
{% endblock %}
